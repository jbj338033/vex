services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vex
      POSTGRES_PASSWORD: vex
      POSTGRES_DB: vex
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vex"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgres://vex:vex@postgres:5432/vex
      VEX_LISTEN_ADDR: "0.0.0.0:3000"
      VEX_PROXY_LISTEN_ADDR: "0.0.0.0:8080"
      VEX_DOMAIN: localhost
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      RUST_LOG: vex_server=info
    ports:
      - "3000:3000"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
